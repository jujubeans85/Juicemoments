<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#120906">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>For Chloe ☕</title>
  <link rel="stylesheet" href="/theme.css">
</head>
<body>
  <main class="moment">
    <a id="gift" class="gift" href="#" aria-label="Tap for caffeine">
      <img id="hero-image" src="/assets/chloe-coffee.jpeg" alt="">
      <span class="spark s1">✦</span>
      <span class="spark s2">✧</span>
      <span class="spark s3">✦</span>

      <div class="copy">
        <div id="eyebrow" class="eyebrow"></div>
        <h1 id="headline" class="headline">Tap anywhere.</h1>
      </div>
    </a>
  </main>

  <div id="thanks" class="thanks" role="status" aria-live="polite">
    <div class="thanks-inner">
      <h1 id="thanks-title">Enjoy ❤️</h1>
      <p id="thanks-text">Opening now…</p>
    </div>
  </div>

  <script src="/engine.js" defer></script>
</body>
</html>
